name=ElectinsIoT
version=2.1.3
author=Nash <support@electins.id>
maintainer=Nash <support@electins.id>
sentence=Zero-dependency async MQTT library for ESP32 and ESP8266. One call in setup(), nothing in loop().
paragraph=Built-in MQTT 3.1.1 engine (no external libraries required). Uses WiFiClient/WiFiClientSecure from the ESP32/ESP8266 SDK. Single-owner engine driven from a dedicated FreeRTOS task (ESP32) or scheduled function (ESP8266) with a thread-safe outbox — no socket access from timer/ISR or WiFi-event contexts, eliminating the race conditions behind random reconnect/restart loops. Automatic LWT, online/offline status, heartbeat, WiFi and MQTT auto-reconnect. Supports QoS 0 and 1, wildcard topics (+/#), per-topic MqttParam callbacks, TLS/SSL, and optional ArduinoJson integration.
category=Communication
url=https://github.com/prj-electins/ElectinsIoT
architectures=esp8266,esp32
includes=ElectinsIoT.h
