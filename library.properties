name=ElectinsIoT
version=2.0.0
author=Nash <info@electins.id>
maintainer=Nash <info@electins.id>
sentence=Zero-dependency async MQTT library for ESP32 and ESP8266. One call in setup(), nothing in loop().
paragraph=Built-in MQTT 3.1.1 engine (no external libraries required). Uses WiFiClient/WiFiClientSecure from the ESP32/ESP8266 SDK and Ticker for non-blocking background operation. Automatic LWT, online/offline status, 30-second heartbeat, WiFi and MQTT auto-reconnect — all running in the background. Supports QoS 0 and 1, wildcard topics (+/#), per-topic MqttParam callbacks, TLS/SSL, and optional ArduinoJson integration.
category=Communication
url=https://github.com/prj-electins/ElectinsIoT
architectures=esp8266,esp32
includes=ElectinsIoT.h
