name=ElectinsIoT
version=3.0.2
author=Nash <support@electins.id>
maintainer=Nash <support@electins.id>
sentence=Zero-dependency async TCP and Protobuf library for ESP32 and ESP8266. One call in setup(), nothing in loop().
paragraph=Built-in lightweight TCP connection engine and inline Protobuf serializer (no external libraries required). Uses WiFiClient/WiFiClientSecure from the ESP32/ESP8266 SDK. Single-owner socket engine driven from a dedicated FreeRTOS task (ESP32) or scheduled function (ESP8266) with a thread-safe outbox — no socket access from timer/ISR or WiFi-event contexts, eliminating race conditions. Automatic online/offline status, heartbeat, WiFi and TCP server auto-reconnect. Supports per-parameter command callbacks, TLS/SSL, and automatic device ID generation via MAC address.
category=Communication
url=https://github.com/prj-electins/ElectinsIoT
architectures=esp8266,esp32
includes=ElectinsIoT.h
